<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love of Jesus Church VBS Registration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <h1>Love of Jesus Church Vacation Bible School</h1>
        <p>Welcome! Use this form to self-enroll your student for VBS.</p>
        <a class="admin-link" href="admin.html">Admin Dashboard</a>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>Student Registration Form</h2>
        <form id="registration-form" novalidate>
          <div class="grid">
            <label>
              Student Full Name
              <input type="text" name="studentName" required />
            </label>

            <label>
              Student Age
              <input type="number" name="age" min="3" max="18" required />
            </label>

            <label>
              Grade
              <input type="text" name="grade" required />
            </label>

            <label>
              Parent/Guardian Name
              <input type="text" name="guardianName" required />
            </label>

            <label>
              Email Address
              <input type="email" name="email" required />
            </label>

            <label>
              Phone Number
              <input type="tel" name="phone" required />
            </label>
          </div>

          <label>
            Emergency Contact (Name + Phone)
            <input type="text" name="emergencyContact" required />
          </label>

          <label>
            Allergies / Medical Notes (optional)
            <textarea name="medicalNotes" rows="3"></textarea>
          </label>

          <label class="checkbox-row">
            <input type="checkbox" name="consent" required />
            I give permission for my child to attend VBS activities.
          </label>

          <button type="submit">Submit Registration</button>
          <p id="form-message" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
